<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">
            <i class="bi bi-pencil-square me-2"></i>Edit Customer
          </h5>
        </div>

        <div class="card-body">

          @if (errorMessage) {
            <div class="alert alert-danger">
              <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage }}
            </div>
          }

          <form #customerForm="ngForm" (ngSubmit)="updateCustomer(customerForm)">

            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="bi bi-person me-1"></i>Full Name
              </label>
              <input
                type="text"
                class="form-control"
                name="name"
                [(ngModel)]="customer.name"
                required
                minlength="3"
                #nameField="ngModel"
                placeholder="Enter full name">
              @if (nameField.invalid && nameField.touched) {
                <div class="text-danger small mt-1">
                  Name is required and must be at least 3 characters
                </div>
              }
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="bi bi-envelope me-1"></i>Email Address
              </label>
              <input
                type="email"
                class="form-control"
                name="email"
                [(ngModel)]="customer.email"
                required
                email
                #emailField="ngModel"
                placeholder="Enter email address">
              @if (emailField.invalid && emailField.touched) {
                <div class="text-danger small mt-1">
                  Please enter a valid email address
                </div>
              }
            </div>

            <div class="d-flex gap-2">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="isLoading">
                @if (isLoading) {
                  <span class="spinner-border spinner-border-sm me-1"></span>
                  Updating...
                } @else {
                  <i class="bi bi-check-circle me-1"></i>Update Customer
                }
              </button>
              <a routerLink="/customers" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Cancel
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
